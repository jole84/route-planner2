<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing switcher</title>
    <style>
        html {
            font-size: 2em;
        }

        input {
            scale: 2;
        }
    </style>
</head>

<body>
    <input id="testing" type="checkbox">
    <label for="testing">Testing mode</label>

    <script>
        const testingCheckbox = document.getElementById("testing");
        testingCheckbox.checked = localStorage.testing;

        testingCheckbox.addEventListener("change", () => {
            if (testingCheckbox.checked) localStorage.testing = testingCheckbox.checked;
            else localStorage.removeItem("testing");
        });
    </script>

</body>

</html>
